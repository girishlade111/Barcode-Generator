<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Barcode Generator with Theme Switching</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- bwip-js for barcode generation -->
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@4.3.0/dist/bwip-js.min.js"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Custom styles for the page and sparkle effect */
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        /* --- Dark Theme (Default) --- */
        body {
            background-color: #111827; /* Dark gray background */
            color: #f3f4f6;
        }

        .card {
            background-color: rgba(17, 24, 39, 0.5); /* bg-gray-900/50 */
            backdrop-filter: blur(4px);
            border-color: #374151; /* gray-700 */
        }
        
        .form-input, .form-select {
            background-color: #374151; /* gray-700 */
            border-color: #4b5563; /* gray-600 */
            color: #f3f4f6;
        }

        .form-input:focus, .form-select:focus {
            --tw-ring-color: #3b82f6;
            border-color: #3b82f6;
        }

        .header-text { color: #ffffff; }
        .subheader-text { color: #9ca3af; } /* gray-400 */
        .barcode-display-bg { background-color: rgba(17, 24, 39, 0.5); border-color: #374151; }
        .message-box-bg { background-color: #1f2937; } /* gray-800 */


        /* --- Light Theme --- */
        body.light-theme {
            background-color: #f3f4f6; /* Light gray background */
            color: #1f2937;
        }

        body.light-theme .card {
            background-color: rgba(255, 255, 255, 0.5);
            border-color: #d1d5db; /* gray-300 */
        }

        body.light-theme .form-input, body.light-theme .form-select {
            background-color: #ffffff;
            border-color: #d1d5db;
            color: #111827;
        }

        body.light-theme .header-text { color: #111827; }
        body.light-theme .subheader-text { color: #4b5563; } /* gray-600 */
        body.light-theme .barcode-display-bg { background-color: #e5e7eb; border-color: #d1d5db; }
        body.light-theme .message-box-bg { background-color: #ffffff; color: #1f2937; }


        /* Sparkle container */
        .sparkle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* Individual sparkle element */
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: white;
            border-radius: 50%;
            opacity: 0;
            animation: sparkle-animation 3s infinite;
        }
        
        body.light-theme .sparkle {
            background-color: #4b5563;
        }

        @keyframes sparkle-animation {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* Card hover effect */
        .card {
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* Custom modal for alerts */
        #message-box {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Sparkle background container -->
    <div class="sparkle-container" id="sparkle-container"></div>
    
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="fixed top-4 right-4 z-50 p-2 rounded-full bg-gray-500/30 backdrop-blur-sm text-white hover:bg-gray-500/50 transition-colors">
        <!-- Sun Icon -->
        <svg id="theme-icon-sun" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <!-- Moon Icon -->
        <svg id="theme-icon-moon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
    </button>

    <div class="relative min-h-screen w-full flex items-center justify-center p-4">
        <div class="w-full max-w-2xl">
            <header class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-bold header-text tracking-tight">Barcode Generator</h1>
                <p class="text-lg subheader-text mt-2">Create and customize barcodes in real-time.</p>
            </header>

            <main class="card rounded-2xl shadow-2xl p-6 md:p-8 border">
                <!-- Input Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label for="barcode-data" class="block text-sm font-medium mb-2">Data</label>
                        <input type="text" id="barcode-data" class="form-input w-full rounded-lg p-3" placeholder="Enter text or numbers" value="1234567890">
                    </div>
                    <div>
                        <label for="barcode-type" class="block text-sm font-medium mb-2">Barcode Type</label>
                        <select id="barcode-type" class="form-select w-full rounded-lg p-3">
                            <option value="qrcode">QR Code</option>
                            <option value="code128" selected>Code 128</option>
                            <option value="ean13">EAN-13</option>
                            <option value="upca">UPC-A</option>
                            <option value="datamatrix">Data Matrix</option>
                            <option value="pdf417">PDF417</option>
                            <option value="itf">ITF</option>
                            <option value="codabar">Codabar</option>
                        </select>
                    </div>
                </div>

                <!-- Customization Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label for="bar-color" class="block text-sm font-medium mb-2">Bar Color</label>
                        <input type="color" id="bar-color" class="w-full h-12 rounded-lg p-1" value="#000000">
                    </div>
                    <div>
                        <label for="bg-color" class="block text-sm font-medium mb-2">Background Color</label>
                        <input type="color" id="bg-color" class="w-full h-12 rounded-lg p-1" value="#FFFFFF">
                    </div>
                </div>

                <!-- Barcode Display Area -->
                <div id="barcode-output" class="barcode-display-bg rounded-lg p-6 flex items-center justify-center min-h-[200px] border">
                    <canvas id="barcode-canvas"></canvas>
                    <p id="error-message" class="text-red-400 text-center hidden"></p>
                </div>

                <!-- Action Buttons -->
                <div class="mt-8 flex flex-col md:flex-row gap-4 justify-center">
                    <button id="download-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-transform transform hover:scale-105 w-full md:w-auto">
                        Download PNG
                    </button>
                    <button id="copy-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-transform transform hover:scale-105 w-full md:w-auto">
                        Copy to Clipboard
                    </button>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Custom Message Box -->
    <div id="message-box" class="message-box-bg fixed bottom-5 right-5 py-3 px-5 rounded-lg shadow-xl opacity-0 transform translate-y-2 pointer-events-none">
        <p id="message-text"></p>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Element References ---
            const dataInput = document.getElementById('barcode-data');
            const typeSelect = document.getElementById('barcode-type');
            const barColorInput = document.getElementById('bar-color');
            const bgColorInput = document.getElementById('bg-color');
            const canvas = document.getElementById('barcode-canvas');
            const errorMessage = document.getElementById('error-message');
            const downloadBtn = document.getElementById('download-btn');
            const copyBtn = document.getElementById('copy-btn');
            const sparkleContainer = document.getElementById('sparkle-container');
            const messageBox = document.getElementById('message-box');
            const messageText = document.getElementById('message-text');
            const themeToggleBtn = document.getElementById('theme-toggle');
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');

            // --- Theme Management ---
            const applyTheme = (theme) => {
                if (theme === 'light') {
                    document.body.classList.add('light-theme');
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                } else {
                    document.body.classList.remove('light-theme');
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                }
            };
            
            themeToggleBtn.addEventListener('click', () => {
                const isLight = document.body.classList.toggle('light-theme');
                const newTheme = isLight ? 'light' : 'dark';
                localStorage.setItem('barcode-theme', newTheme);
                applyTheme(newTheme);
            });

            // --- Sparkle Effect ---
            const createSparkles = () => {
                const sparkleCount = 50;
                for (let i = 0; i < sparkleCount; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.top = `${Math.random() * 100}%`;
                    sparkle.style.left = `${Math.random() * 100}%`;
                    sparkle.style.animationDuration = `${Math.random() * 2 + 2}s`;
                    sparkle.style.animationDelay = `${Math.random() * 2}s`;
                    sparkleContainer.appendChild(sparkle);
                }
            };

            // --- Custom Message/Alert Function ---
            const showMessage = (text, duration = 3000) => {
                messageText.textContent = text;
                messageBox.classList.remove('opacity-0', 'translate-y-2');
                messageBox.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    messageBox.classList.remove('opacity-100', 'translate-y-0');
                    messageBox.classList.add('opacity-0', 'translate-y-2');
                }, duration);
            };

            // --- Barcode Generation Logic ---
            const generateBarcode = () => {
                const data = dataInput.value;
                const type = typeSelect.value;
                const barColor = barColorInput.value.substring(1);
                const bgColor = bgColorInput.value.substring(1);

                if (!data) {
                    canvas.style.display = 'none';
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = 'Please enter data to generate a barcode.';
                    return;
                }

                try {
                    bwipjs.toCanvas(canvas, {
                        bcid: type, text: data, scale: 3, height: 10,
                        includetext: true, textxalign: 'center',
                        barcolor: barColor, backgroundcolor: bgColor
                    });
                    canvas.style.display = 'block';
                    errorMessage.style.display = 'none';
                } catch (e) {
                    canvas.style.display = 'none';
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = `Error: ${e.message || 'Invalid data for this barcode type.'}`;
                }
            };

            // --- Event Listeners ---
            dataInput.addEventListener('input', generateBarcode);
            typeSelect.addEventListener('change', generateBarcode);
            barColorInput.addEventListener('input', generateBarcode);
            bgColorInput.addEventListener('input', generateBarcode);

            downloadBtn.addEventListener('click', () => {
                if (canvas.style.display === 'none') {
                    showMessage('Cannot download, no barcode generated.');
                    return;
                }
                const link = document.createElement('a');
                link.download = `${typeSelect.value}-${dataInput.value}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showMessage('Download started!');
            });

            copyBtn.addEventListener('click', () => {
                if (canvas.style.display === 'none') {
                    showMessage('Cannot copy, no barcode generated.');
                    return;
                }
                canvas.toBlob((blob) => {
                    try {
                        navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
                        showMessage('Barcode copied to clipboard!');
                    } catch (error) {
                         console.error('Copy failed', error);
                         showMessage('Copy failed. Your browser may not support this feature.', 4000);
                    }
                });
            });

            // --- Initial Setup ---
            createSparkles();
            generateBarcode();
            const savedTheme = localStorage.getItem('barcode-theme') || 'dark';
            applyTheme(savedTheme);
        });
    </script>

</body>
</html>
